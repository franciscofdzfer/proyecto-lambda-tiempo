services:
  kafka:
    image: apache/kafka:4.3.1
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: bGFtYmRhLXRpZW1wby0y

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  productor:
    build: ./productor
    container_name: productor
    depends_on:
      - kafka
    restart: on-failure

  spark-master:
    build: ./spark-cluster
    container_name: spark-master
    ports:
      - "8082:8080"
      - "7077:7077"
    command: >
      /bin/sh -c "export SPARK_HOME=$$(python -c 'import pyspark, os; print(os.path.dirname(pyspark.__file__))') &&
      $$SPARK_HOME/bin/spark-class org.apache.spark.deploy.master.Master"

  spark-worker-1:
    build: ./spark-cluster
    container_name: spark-worker-1
    depends_on:
      - spark-master
    command: >
      /bin/sh -c "export SPARK_HOME=$$(python -c 'import pyspark, os; print(os.path.dirname(pyspark.__file__))') &&
      $$SPARK_HOME/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"

  spark-worker-2:
    build: ./spark-cluster
    container_name: spark-worker-2
    depends_on:
      - spark-master
    command: >
      /bin/sh -c "export SPARK_HOME=$$(python -c 'import pyspark, os; print(os.path.dirname(pyspark.__file__))') &&
      $$SPARK_HOME/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077"

  spark-streaming:
    build: ./spark-streaming
    container_name: spark-streaming
    depends_on:
      - kafka
      - minio
      - spark-master
    restart: on-failure

volumes:
  minio_data:
